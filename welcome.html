<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Arevarapu's Wedding</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      background: radial-gradient(ellipse at center, #1a0035 0%, #0a0015 60%, #000008 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Cinzel', serif;
      position: relative;
    }

    .watermarks {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .wm {
      position: absolute;
      font-size: 13px;
      color: rgba(212, 175, 55, 0.07);
      font-family: 'Cinzel', serif;
      letter-spacing: 2px;
      white-space: nowrap;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0% { opacity: 0; transform: translateY(20px); }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-20px); }
    }

    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: #d4af37;
      animation: twinkle ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.1; transform: scale(1); }
      50% { opacity: 0.9; transform: scale(1.4); }
    }

    .card {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 50px;
      background: rgba(10, 0, 30, 0.6);
      border: 1px solid rgba(212, 175, 55, 0.25);
      border-radius: 20px;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 60px rgba(120, 0, 200, 0.2), inset 0 0 40px rgba(212, 175, 55, 0.03);
      max-width: 520px;
      width: 90%;
      animation: cardAppear 1.5s ease forwards;
    }

    @keyframes cardAppear {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .om-wrap {
      margin-bottom: 30px;
      filter: drop-shadow(0 0 30px #d4af37) drop-shadow(0 0 60px rgba(212, 175, 55, 0.5));
      animation: omPulse 3s ease-in-out infinite;
    }

    @keyframes omPulse {
      0%, 100% {
        filter: drop-shadow(0 0 25px #d4af37) drop-shadow(0 0 50px rgba(212, 175, 55, 0.4));
        transform: scale(1);
      }
      50% {
        filter: drop-shadow(0 0 50px #d4af37) drop-shadow(0 0 100px rgba(212, 175, 55, 0.8)) drop-shadow(0 0 5px #fff);
        transform: scale(1.06);
      }
    }

    .om-text {
      font-size: 110px;
      font-family: 'Cinzel Decorative', serif;
      background: linear-gradient(180deg, #fff8dc 0%, #d4af37 35%, #b8860b 65%, #d4af37 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      user-select: none;
    }

    .divider {
      width: 180px;
      height: 1px;
      background: linear-gradient(to right, transparent, #d4af37, transparent);
      margin: 5px auto 22px;
      opacity: 0.7;
    }

    .family-title {
      font-size: 12px;
      letter-spacing: 5px;
      color: #c8a8e0;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .invite-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 13px;
      color: rgba(212, 175, 55, 0.75);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .btn {
      display: inline-block;
      padding: 16px 44px;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #0a0015;
      background: linear-gradient(135deg, #d4af37 0%, #f5e17a 40%, #d4af37 70%, #b8860b 100%);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 30px rgba(212, 175, 55, 0.5);
      transition: transform 0.2s, box-shadow 0.2s;
      animation: btnGlow 2.5s ease-in-out infinite;
    }

    .btn:hover {
      transform: scale(1.06);
      box-shadow: 0 6px 40px rgba(212, 175, 55, 0.8);
    }

    @keyframes btnGlow {
      0%, 100% { box-shadow: 0 4px 30px rgba(212, 175, 55, 0.5); }
      50% { box-shadow: 0 4px 50px rgba(212, 175, 55, 0.9), 0 0 20px rgba(255, 255, 255, 0.2); }
    }

    .btn::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -60%;
      width: 50%;
      height: 200%;
      background: rgba(255, 255, 255, 0.25);
      transform: skewX(-20deg);
      animation: shine 3s ease-in-out infinite;
    }

    @keyframes shine {
      0% { left: -60%; }
      60%, 100% { left: 130%; }
    }

    @media (max-width: 480px) {
      .om-text { font-size: 80px; }
      .card { padding: 40px 28px; }
      .btn { padding: 14px 32px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <audio id="bgMusic" loop preload="auto">
    <source src="./BGM.mp3" type="audio/mpeg" />
  </audio>

  <div class="stars" id="stars"></div>
  <div class="watermarks" id="watermarks"></div>

  <div class="card">
    <div class="om-wrap">
      <div class="om-text">&#x0950;</div>
    </div>
    <div class="divider"></div>
    <div class="family-title">Arevarapu Family</div>
    <div class="invite-title">Joyfully Invites You To</div>
    <div class="divider"></div>
    <a class="btn" id="enterBtn" href="index.html">&#x1F4AB; Arevarapu's Wedding</a>
  </div>

  <script>
    const sc = document.getElementById('stars');
    for (let i = 0; i < 90; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const sz = (Math.random() * 2.5 + 0.5) + 'px';
      s.style.cssText = `width:${sz};height:${sz};top:${Math.random() * 100}%;left:${Math.random() * 100}%;animation-duration:${2 + Math.random() * 4}s;animation-delay:${Math.random() * 5}s;`;
      sc.appendChild(s);
    }

    const slokas = [
      'Om Namah Shivaya',
      'Shubham Bhavatu',
      'Mangalam Bhagavan Vishnu',
      'Om Shanti Shanti Shantih',
      'Sarvey Bhavantu Sukhinah',
      'Om Namo Narayanaya',
      'Shubha Vivaah',
      'Mangalaya Tano Harih',
      'Om Gam Ganapataye Namah',
      'Satyam Shivam Sundaram',
      'Om Sri Maha Lakshmyai Namah',
      'Vivah Mangalam'
    ];

    const wc = document.getElementById('watermarks');
    for (let i = 0; i < 30; i++) {
      const w = document.createElement('div');
      w.className = 'wm';
      w.textContent = slokas[Math.floor(Math.random() * slokas.length)];
      w.style.cssText = `left:${Math.random() * 90}%;top:${Math.random() * 90}%;font-size:${10 + Math.random() * 8}px;animation-duration:${8 + Math.random() * 10}s;animation-delay:${Math.random() * 8}s;transform:rotate(${-15 + Math.random() * 30}deg);`;
      wc.appendChild(w);
    }

    const music = document.getElementById('bgMusic');
    const enterBtn = document.getElementById('enterBtn');

    music.volume = 0.6;

    function startMusic() {
      music.play().catch(() => {});
    }

    window.addEventListener('load', () => {
      music.play().catch(() => {
        document.addEventListener('click', startMusic, { once: true });
        document.addEventListener('touchstart', startMusic, { once: true });
      });
    });

    enterBtn.addEventListener('click', () => {
      music.play().catch(() => {});
    });
  </script>
</body>
</html>
